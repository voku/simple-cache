name: CI

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  tests:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3']

    services:
      memcached:
        image: memcached:1.6-alpine
        ports:
          - 11211:11211
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          ini-values: apc.enable_cli=1, opcache.enable_cli=1
          extensions: apcu, igbinary, memcache, memcached, opcache, redis
          tools: composer:v2

      - name: Wait for services
        run: |
          for port in 11211 6379; do
            for attempt in {1..30}; do
              if (echo > /dev/tcp/127.0.0.1/${port}) >/dev/null 2>&1; then
                break
              fi

              if [ "${attempt}" -eq 30 ]; then
                echo "Service on port ${port} did not become ready in time."
                exit 1
              fi

              sleep 1
            done
          done

      - name: Cache Composer downloads
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-composer-
            ${{ runner.os }}-composer-

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Install test dependencies
        run: >
          composer require --dev --no-interaction --prefer-dist
          "predis/predis:^1.1 || ^2.0 || ^3.0"
          "symfony/var-exporter:^5.4 || ^6.0 || ^7.0"

      - name: Run PHPUnit
        run: php vendor/bin/phpunit -c phpunit.xml

  static-analysis:
    name: PHPStan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      memcached:
        image: memcached:1.6-alpine
        ports:
          - 11211:11211
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: xdebug
          extensions: apcu, igbinary, memcache, memcached, opcache, redis
          tools: composer:v2

      - name: Cache Composer downloads
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: ${{ runner.os }}-php-8.3-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php-8.3-composer-
            ${{ runner.os }}-composer-

      - name: Wait for services
        run: |
          for port in 11211 6379; do
            for attempt in {1..30}; do
              if (echo > /dev/tcp/127.0.0.1/${port}) >/dev/null 2>&1; then
                break
              fi

              if [ "${attempt}" -eq 30 ]; then
                echo "Service on port ${port} did not become ready in time."
                exit 1
              fi

              sleep 1
            done
          done

      - name: Install analysis dependencies
        run: >
          composer config --no-plugins allow-plugins.infection/extension-installer true &&
          composer require --dev --no-interaction --prefer-dist
          infection/infection:^0.32.7
          phpstan/phpstan:^1.12.27
          "predis/predis:^1.1 || ^2.0 || ^3.0"
          "symfony/var-exporter:^5.4 || ^6.0 || ^7.0"

      - name: Run PHPStan
        run: php vendor/bin/phpstan analyse

      - name: Run Infection
        env:
          XDEBUG_MODE: coverage
        run: php vendor/bin/infection --show-mutations=0
